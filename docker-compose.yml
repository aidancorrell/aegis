# ClawShield — default single-container development compose
# For production two-container (Mode A with external agent), use the compose
# generated by the wizard at http://localhost:8000/wizard-page

services:
  clawshield:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - clawshield.env
    volumes:
      - ./agent_config.json:/app/agent_config.json:ro
      - agent-workspace:/app/workspace
      - agent-audit:/app/audit
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m

volumes:
  agent-workspace:
  agent-audit:
