# Aegis — production two-container stack
# Aegis intercepts Mako's LLM traffic via DNS override
# Run: docker compose up -d

services:
  aegis:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - aegis.env
    volumes:
      - agent-audit:/mnt/agent-audit:ro
      - agent-workspace:/mnt/agent-workspace:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32M
    security_opt:
      - no-new-privileges:true
      - seccomp=seccomp.json
    cap_drop:
      - ALL
    mem_limit: 256m
    networks:
      clawnet:
        ipv4_address: 172.20.0.10

  agent:
    image: ghcr.io/aidancorrell/mako:latest
    env_file:
      - agent.env
    # ANTHROPIC_BASE_URL in agent.env routes SDK traffic through Aegis proxy.
    # For Gemini (hardcoded httpx URL), DNS override + TLS termination would be
    # needed — not yet implemented. Use Anthropic provider for full interception.
    volumes:
      - agent-audit:/app/audit
      - agent-workspace:/app/workspace
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    networks:
      - clawnet
    depends_on:
      - aegis

networks:
  clawnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  agent-audit:
  agent-workspace:
