# ClawShield — development compose with hot reload
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# Frontend dev: cd frontend && npm run dev  (Vite on :5173, proxies API to :8000)
# Frontend build: cd frontend && npm run build  (outputs to static/dist, served by FastAPI)

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://clawshield:8000
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - clawnet

  clawshield:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - clawshield.env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./static:/app/static
      - agent-audit:/mnt/agent-audit:ro
      - agent-workspace:/mnt/agent-workspace:ro
    command: uvicorn clawshield.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    networks:
      - clawnet

  # Mako agent (Mode A — comment out if using agent-builder below)
  agent:
    build: ../mako
    env_file:
      - agent.env
    volumes:
      - agent-audit:/app/audit
      - agent-workspace:/app/workspace
    entrypoint: ["python", "-m", "mako.main", "--telegram"]
    stdin_open: true
    tty: true
    restart: "no"
    networks:
      - clawnet
    depends_on:
      - clawshield

  # clawshield-agent (Mode B — comment out 'agent' above and use this for agent-builder testing)
  # agent-builder:
  #   build: ./agent
  #   environment:
  #     - ANTHROPIC_BASE_URL=http://clawshield:8000/proxy/anthropic
  #     - ANTHROPIC_API_KEY=DUMMY_KEY_INTERCEPTED_BY_CLAWSHIELD
  #     - AGENT_CONFIG_PATH=/app/agent_config.json
  #   volumes:
  #     - ./agent_config.json:/app/agent_config.json:ro
  #     - agent-audit:/app/audit
  #     - agent-workspace:/app/workspace
  #   ports:
  #     - "8001:8001"
  #   networks:
  #     - clawnet
  #   depends_on:
  #     - clawshield

networks:
  clawnet:
    driver: bridge

volumes:
  agent-audit:
  agent-workspace:
